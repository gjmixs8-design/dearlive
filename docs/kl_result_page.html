<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala Yearly MC Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-maroon: #800000;
            --header-salmon: #f7bf58;
            --main-red: #b22222;
            --border-heavy: #333;
            --scale: 1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0faff;
            margin: 0;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            color: var(--sidebar-maroon);
            margin-top: 30px;
            font-size: 22px;
            text-transform: uppercase;
            font-family: "Young Serif", serif;
        }

        .table-outer {
            width: 98vw;
            margin: 20px auto;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .table-inner {
            transform: scale(var(--scale));
            transform-origin: top center;
            display: inline-block;
        }

        table {
            border-collapse: collapse;
            background: #fff;
            border: 2px solid #000;
            width: 1600px;
        }

        th, td {
            border: 1px solid #999;
            padding: 6px 2px;
            font-weight: bold;
            font-size: 11px;
            text-align: center;
        }

        .hdr-main {
            background: #e99d11;
            color: white;
            font-size: 20px;
        }

        .hdr-sub {
            background: #f8d256;
            color: #d32f2f;
        }

        .hdr-labels {
            background: #fff3e0;
            color: #555;
            font-size: 10px;
        }

        .date-col {
            background: #fcbb67;
            width: 50px;
            border-right: 2px solid var(--border-heavy);
        }

        .month-header {
            background: var(--header-salmon);
            color: #000;
            border-right: 2px solid var(--border-heavy);
        }

        .col-right {
            border-right: 2px solid var(--border-heavy);
        }

        .stars {
            color: #d32f2f;
            background: #eee;
        }

        .highlight-red {
            color: #d32f2f;
            background-color: #ffebee;
        }

        .btn-download {
            background: var(--sidebar-maroon);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: #a00000;
        }
    </style>
</head>

<body>

    <h1>Kerala Yearly Result Chart (2025 - 26)</h1>

    <div class="table-outer" id="tableOuter">
        <div class="table-inner" id="tableInner">
            <table id="targetTable">
                <thead>
                    <tr class="hdr-main">
                        <th colspan="25">Kerala Yearly Result Chart (2025 - 26)</th>
                    </tr>
                    <tr class="hdr-sub">
                        <th class="date-col" rowspan="2">DATE</th>
                        <th colspan="2" class="month-header">FEB</th>
                        <th colspan="2" class="month-header">MAR</th>
                        <th colspan="2" class="month-header">APR</th>
                        <th colspan="2" class="month-header">MAY</th>
                        <th colspan="2" class="month-header">JUN</th>
                        <th colspan="2" class="month-header">JUL</th>
                        <th colspan="2" class="month-header">AUG</th>
                        <th colspan="2" class="month-header">SEP</th>
                        <th colspan="2" class="month-header">OCT</th>
                        <th colspan="2" class="month-header">NOV</th>
                        <th colspan="2" class="month-header">DEC</th>
                        <th colspan="2" class="month-header">JAN</th>
                    </tr>
                    <tr class="hdr-labels">
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                        <th>MACHINE</th><th class="col-right">RESULT</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <button class="btn-download" id="dlBtn" onclick="downloadTable()">Download Chart</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://dearlive-97ef5-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function fetchAndBuildTable() {
            const lotteryRef = ref(db, 'lottery');

            onValue(lotteryRef, (snapshot) => {
                const allData = snapshot.val() || {};
                const body = document.getElementById('tableBody');
                const currentYear = 2026; // Set based on your database context
                let html = '';

                // Month mapping to match table headers: FEB (02) to JAN (01)
                const monthKeys = ["02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "01"];
                
                for (let d = 1; d <= 31; d++) {
                    const dayStr = String(d).padStart(2, '0');
                    html += `<tr><td class="date-col">${d}</td>`;

                    for (let m = 0; m < 12; m++) {
                        const monthStr = monthKeys[m];
                        // If month is JAN, it belongs to the following year
                        const year = (monthStr === "01") ? currentYear : 2025; 
                        const dateKey = `${year}-${monthStr}-${dayStr}`;

                        // Short month validation
                        const isFebEnd = (d > 28 && monthStr === "02");
                        const isShortMonthEnd = (d > 30 && ["04", "06", "09", "11"].includes(monthStr));

                        if (isFebEnd || isShortMonthEnd) {
                            html += `<td class="stars">***</td><td class="col-right stars">***</td>`;
                        } else {
                            let machineVal = "---";
                            let resultVal = "---";

                            if (allData[dateKey]) {
                                const slots = allData[dateKey];
                                // Search through all time slots for kl_machine and kl_result
                                for (let time in slots) {
                                    if (slots[time].kl_machine) machineVal = slots[time].kl_machine;
                                    if (slots[time].kl_result) resultVal = slots[time].kl_result;
                                }
                            }

                            let cls = (d % 5 === 0) ? 'highlight-red' : '';
                            html += `<td class="${cls}">${machineVal}</td><td class="col-right ${cls}">${resultVal}</td>`;
                        }
                    }
                    html += `</tr>`;
                }
                body.innerHTML = html;
                applyAutoScale();
            });
        }

        window.addEventListener('load', fetchAndBuildTable);
    </script>

    <script>
        function applyAutoScale() {
            const inner = document.getElementById('tableInner');
            const outer = document.getElementById('tableOuter');
            const table = document.getElementById('targetTable');

            const availableWidth = window.innerWidth * 0.98;
            const actualWidth = 1600;
            const scale = availableWidth / actualWidth;

            if (scale < 1) {
                document.documentElement.style.setProperty('--scale', scale);
                outer.style.height = (table.offsetHeight * scale) + "px";
            } else {
                document.documentElement.style.setProperty('--scale', '1');
                outer.style.height = "auto";
            }
        }

        async function downloadTable() {
            const btn = document.getElementById('dlBtn');
            const node = document.getElementById('targetTable');
            btn.innerText = "Processing...";

            try {
                const dataUrl = await htmlToImage.toPng(node, {
                    backgroundColor: '#fff',
                    style: { transform: 'scale(1)' }
                });
                const link = document.createElement('a');
                link.download = 'Kerala-Yearly-Chart.png';
                link.href = dataUrl;
                link.click();
            } catch (error) {
                alert("Download failed.");
            } finally {
                btn.innerText = "Download Chart";
            }
        }

        window.addEventListener('resize', applyAutoScale);
    </script>
</body>
</html>
