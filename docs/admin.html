<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAR Admin Panel</title>
    <style>
        :root {
            --gold: #f8c128;
            --dark: #111;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #856234, #111);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-top {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-tabs button {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--gold);
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
        }

        .nav-tabs button.active {
            background: var(--gold);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px var(--gold);
        }

        .page-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .page-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid-header {
            display: grid;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
            color: var(--gold);
        }

        .dear-grid {
            grid-template-columns: 100px 1fr 1fr 1fr 1fr;
        }

        .kl-grid {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .jackpot-grid {
            grid-template-columns: 120px 1fr;
        }

        .row-card {
            display: grid;
            background: var(--dark);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(248, 193, 40, 0.2);
            align-items: center;
            gap: 10px;
        }

        .time-label {
            text-align: center;
            font-weight: bold;
            color: var(--gold);
        }

        input {
            width: 100%;
            padding: 10px;
            background: var(--glass);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-group {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .main-btn {
            background: var(--gold);
            color: #000;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }

        .main-btn:hover {
            filter: brightness(1.2);
        }
    </style>
    <script type="module" src="firebase-init.js" defer></script>
    <script type="module" src="admin.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header-top">
            <h1>DEAR Live Admin</h1>
            <input type="date" id="select-date" style="width: auto; padding: 10px 20px;">
        </div>

        <div class="nav-tabs">
            <button id="tab-dear" class="active">Dear Entry</button>
            <button id="tab-kl">KL & Jackpot Entry</button>
        </div>

        <div id="page-dear" class="page-content active">
            <div class="grid-header dear-grid">
                <div>Time</div>
                <div>Machine (5)</div>
                <div>Result (5)</div>
                <div>3-Digit Res</div>
                <div>Guess (2D)</div>
            </div>
            <div id="dear-rows"></div>
        </div>

        <div id="page-kl" class="page-content">
            <h2 style="color:var(--gold); text-align:center;">KL Daily Results</h2>
            <div class="grid-header kl-grid">
                <div>KL Machine (5)</div>
                <div>KL Result (5)</div>
                <div>KL Guess (3D)</div>
            </div>
            <div id="kl-row"></div>

            <h2 style="color:var(--gold); text-align:center; margin-top:40px;">Jackpot Section</h2>
            <div class="grid-header jackpot-grid">
                <div>Time</div>
                <div>Jackpot Number (3)</div>
            </div>
            <div id="jackpot-rows"></div>
        </div>

        <div class="btn-group">
            <button id="submit-btn" class="main-btn">Save All Entries</button>
            <a href="view.html"><button class="main-btn" style="background:#555; color:#fff;">View Database</button></a>
        </div>
    </div>
</body>

</html>
