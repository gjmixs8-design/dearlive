<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAR Admin Panel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8c128, #ce882d, #f3c07c);
            color: #fff;
        }

        .container {
            padding: 10px;
            /* Reduced padding for more horizontal space */
        }

        .header-top {
            text-align: center;
            margin-bottom: 30px;
        }

        .label-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 13px;
            /* Slightly smaller font for 7 columns */
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .label-bar div {
            flex: 1;
        }

        .cards-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            /* Tighter gap for better fit */
        }

        .card-column {
            flex: 1;
            min-width: 100px;
            /* Adjusted for 7 columns */
        }

        .card {
            position: relative;
            background: #111;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Animated Border Effect */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            padding: 2px;
            background-image: linear-gradient(45deg, #f0c757, #e29b16, #e4d69b);
            background-size: 600% 600%;
            animation: borderRoll 10s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        @keyframes borderRoll {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .card input {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background: #dddb50;
            color: #242222;
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #f59c36;
            color: #fff;
        }

        a {
            text-decoration: none;
        }
    </style>
    <script type="module" src="firebase-init.js" defer></script>
    <script type="module" src="admin.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header-top">
            <h1>DEAR Admin</h1>
            <input type="date" id="select-date">
        </div>

        <div class="label-bar">
            <div>MC Number</div>
            <div>Result</div>
            <div>3 Digit</div>
            <div>KL Machine</div>
            <div>KL Result</div>
            <div>Guessing</div>
            <div>Jackpot</div>
        </div>

        <div class="cards-wrapper">
            <div class="card-column" id="machine-column"></div>
            <div class="card-column" id="result-column"></div>
            <div class="card-column" id="three_digit-column"></div>
            <div class="card-column" id="kl-machine-column"></div>
            <div class="card-column" id="kl-result-column"></div>
            <div class="card-column" id="guessing-column"></div>
            <div class="card-column" id="jackpot-column"></div>
        </div>

        <div class="btn-group">
            <button id="submit-data-btn">Submit All Data</button>
            <button id="logout-btn">Logout</button>
            <a href="view.html"><button id="view-btn">View Results</button></a>
        </div>
    </div>
</body>

</html>
