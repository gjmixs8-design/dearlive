<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEAR Admin</title>
    <style>
        :root {
            --primary: #f8c128;
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(0, 0, 0, 0.3);
            --text: #ffffff;
            --dice-neon: #39FF14;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .header-top {
            text-align: center;
            padding: 20px 0;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        #select-date {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(248, 193, 40, 0.4);
            background: #4d4c4c;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            background: var(--input-bg);
            padding: 5px;
            border-radius: 15px;
        }

        .nav-tabs button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #ccc;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-tabs button.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 10px rgba(248, 193, 40, 0.2);
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .time-tag {
            width: 100%;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 5px;
        }

        .input-group {
            flex: 1 1 120px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            width: 100%;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0, 0, 0, 0.5);
        }

        .dice-btn {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-top: 15px;
        }

        .dice-btn:active { transform: scale(0.9) rotate(20deg); }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .main-btn {
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1rem;
        }

        #submit-data-btn {
            background: var(--primary);
            color: #000;
            box-shadow: 0 10px 20px rgba(248, 193, 40, 0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        @media (min-width: 768px) {
            .time-tag { width: 80px; border-bottom: none; margin-bottom: 0; }
            .dice-btn { margin-top: 0; }
            .input-group { flex: 1; }
        }
    </style>
</head>
<body>
    <div id="loader"><b style="color:var(--primary); font-size: 1.5rem;">🎲 Rolling Records...</b></div>
    <div class="container">
        <div class="header-top">
            <h1>DEAR ADMIN</h1>
            <input type="date" id="select-date">
        </div>

        <div class="nav-tabs">
            <button id="tab-dear" class="active">DEAR</button>
            <button id="tab-kl" class="active-kl">KL & JACKPOT</button>
        </div>

        <div id="page-dear" class="page-content active">
            <div id="dear-rows"></div>
        </div>

        <div id="page-kl" class="page-content">
            <div id="kl-row"></div>
            <div id="jackpot-rows" style="margin-top:20px;"></div>
        </div>

        <div class="btn-group">
            <button id="submit-data-btn" class="main-btn">SUBMIT ALL</button>
            <button id="clear-btn" class="main-btn secondary-btn">CLEAR Form</button>
            <a href="view.html" style="text-decoration:none"><button class="main-btn secondary-btn" style="width:100%">View Results</button></a>
            <button id="logout-btn" class="main-btn" style="background:transparent; color:red; border:1px solid red">Logout</button>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
