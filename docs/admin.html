<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAR Admin Panel</title>
    <style>
        :root {
            --gold: #f8c128;
            --white: #f1f1f1;
            --dark: #111;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #444, #111);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Header & Tabs */
        .header-top {
            text-align: center;
            margin-bottom: 20px;
        }

        #select-date {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: var(--white);
            color: #161515;
            width: 100%;
            max-width: 300px;
            font-size: 16px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-tabs button {
            flex: 1;
            padding: 15px;
            background: var(--dark);
            color: #fff;
            border: 1px solid var(--gold);
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            border-radius: 8px;
        }

        .nav-tabs button.active {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px rgba(248, 193, 40, 0.3);
        }

        /* Grid System */
        .page-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid-row {
            display: grid;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px;
            background: var(--glass);
            border-radius: 10px;
            border-left: 4px solid var(--gold);
        }

        .grid-dear {
            grid-template-columns: 90px 1fr 1fr 1fr 1fr;
        }

        .grid-kl {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .grid-jackpot {
            grid-template-columns: 90px 1fr;
        }

        /* Mobile Optimization */
        @media (max-width: 650px) {

            .grid-dear,
            .grid-kl {
                grid-template-columns: 1fr 1fr;
            }

            .time-tag {
                grid-column: span 2;
                background: var(--gold);
                color: #000;
                text-align: center;
                border-radius: 5px;
                font-weight: 900;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            text-align: center;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--gold);
            outline: none;
            background: #111;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .primary-btn {
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.2s;
        }

        .primary-btn:active {
            transform: scale(0.98);
        }

        #submit-data-btn {
            background: var(--gold);
            color: #000;
        }

        /* Loading Overlay */
        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="loader"><b style="color:var(--gold)">Syncing with Database...</b></div>
    <div class="container">
        <div class="header-top">
            <h1 style="letter-spacing: 2px;">DEAR ADMIN</h1>
            <input type="date" id="select-date">
        </div>

        <div class="nav-tabs">
            <button id="tab-dear" class="active">DEAR </button>
            <button id="tab-kl">KL & JACKPOT</button>
        </div>

        <div id="page-dear" class="page-content active">
            <div id="dear-rows"></div>
        </div>
        <div id="page-kl" class="page-content">
            <h3 style="color:var(--gold)">KL DAILY</h3>
            <div id="kl-row"></div>
            <h3 style="color:var(--gold); margin-top:30px;">JACKPOT SLOTS</h3>
            <div id="jackpot-rows"></div>
        </div>

        <div class="btn-group">
            <button id="submit-data-btn" class="primary-btn">Submit All Records</button>
            <a href="view.html" style="text-decoration:none"><button class="primary-btn"
                    style="width:100%; background:#fff; color:#000">view & Edit </button></a>
            <button id="logout-btn" class="primary-btn" style="background:#444; color:#fff">Logout</button>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>

</html>
