<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Results</title>
  <style>
    :root {
      --gold: #f8c128;
      --bg-dark: #1a1a1a;
      --card-bg: #262626;
      --border-color: #333;
      --input-bg: #000;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-dark);
      color: #fff;
      padding: 10px;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 100px;
      /* Space for floating buttons */
    }

    /* Header Styling */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-row h2 {
      color: var(--gold);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Cards */
    .section-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    /* Grid Layouts */
    .grid-header {
      display: grid;
      gap: 10px;
      font-weight: bold;
      color: var(--gold);
      padding: 10px;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      margin-bottom: 10px;
    }

    .grid-row {
      display: grid;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
    }

    /* Specific Grid Definitions */
    .grid-dear {
      grid-template-columns: 80px 1fr 1fr 1fr 1fr;
    }

    .grid-kl {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .grid-jack {
      grid-template-columns: 80px 1fr;
    }

    /* Form Elements */
    input {
      width: 100%;
      padding: 10px;
      background: var(--input-bg);
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      text-align: center;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
    }

    input.dirty {
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(248, 193, 40, 0.4);
      background: #2a2410;
    }

    /* Mobile Responsiveness */
    @media (max-width: 600px) {
      .grid-header {
        display: none;
        /* Hide headers on mobile as per original design */
      }

      .grid-dear,
      .grid-kl {
        grid-template-columns: 1fr 1fr;
      }

      .time-cell {
        grid-column: span 2;
        color: var(--gold);
        font-weight: bold;
        text-align: center;
        background: #333;
        padding: 5px;
        border-radius: 4px;
        margin-bottom: 5px;
      }
    }

    /* Action Bar */
    .floating-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-top: 2px solid var(--gold);
      box-sizing: border-box;
      z-index: 1000;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .save-btn {
      background: var(--gold);
      color: #000;
    }

    .back-btn {
      background: #444;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header-row">
      <h2>Dear</h2>
      <h2>DATA REVIEW</h2>
      <input type="date" id="datePicker" style="width:160px; border-color:var(--gold)">
    </div>

    <div class="section-card">
      <div class="grid-header grid-dear">
        <div>Time</div>
        <div>Machine</div>
        <div>Result</div>
        <div>3Digit Result</div>
        <div>Dear Guessing</div>
      </div>
      <div id="dear-view">
      </div>
    </div>

    <div class="section-card">
      <h4 style="color:var(--gold); margin: 0 0 15px 0;">KL DATA</h4>
      <div class="grid-header grid-kl">
        <div>Machine</div>
        <div>Result</div>
        <div>Guessing</div>
      </div>
      <div id="kl-view">
      </div>
    </div>

    <div class="section-card">
      <h4 style="color:var(--gold); margin: 0 0 15px 0;">JACKPOT</h4>
      <div id="jack-view">
      </div>
    </div>

    <div class="floating-actions">
      <button id="saveBtn" class="btn save-btn">Save Changes</button>
      <a href="admin.html" style="flex:1; display: flex;">
        <button type="button" class="btn back-btn" style="width:100%">Back</button>
      </a>
    </div>
  </div>

  <script type="module" src="view.js"></script>
</body>

</html>
