<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Results</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 10px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    .section-card {
      background: #262626;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #333;
    }

    .grid-header {
      display: grid;
      gap: 10px;
      font-weight: bold;
      color: #f8c128;
      padding: 10px;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      margin-bottom: 10px;
    }

    .grid-row {
      display: grid;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #333;
      align-items: center;
    }

    .grid-dear {
      grid-template-columns: 80px 1fr 1fr 1fr 1fr;
    }

    .grid-kl {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .grid-jack {
      grid-template-columns: 80px 1fr;
    }

    input {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      text-align: center;
      font-size: 15px;
    }

    input.dirty {
      border-color: #f8c128;
      box-shadow: 0 0 8px rgba(248, 193, 40, 0.4);
      background: #2a2410;
    }

    @media (max-width: 600px) {
      .grid-header {
        display: none;
      }

      .grid-dear,
      .grid-kl {
        grid-template-columns: 1fr 1fr;
      }

      .time-cell {
        grid-column: span 2;
        color: #f8c128;
        font-weight: bold;
        text-align: center;
        background: #333;
        padding: 5px;
        border-radius: 4px;
      }
    }

    .floating-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-top: 2px solid var(--gold);
      box-sizing: border-box;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .save-btn {
      background: #f8c128;
      color: #000;
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="color:#f8c128; margin:0;">DATA REVIEW</h2>
      <input type="date" id="datePicker" style="width:160px; border-color:#f8c128">
    </div>

    <div class="section-card">
      <div class="grid-header grid-dear">
        <div>Time</div>
        <div>Machine</div>
        <div>Result</div>
        <div>3D</div>
        <div>2D</div>
      </div>
      <div id="dear-view"></div>
    </div>

    <div class="section-card">
      <h4 style="color:#f8c128; margin-top:0">KL DATA</h4>
      <div class="grid-header grid-kl">
        <div>Machine</div>
        <div>Result</div>
        <div>Guessing</div>
      </div>
      <div id="kl-view"></div>
    </div>

    <div class="section-card">
      <h4 style="color:#f8c128; margin-top:0">JACKPOT</h4>
      <div id="jack-view"></div>
    </div>

    <div class="floating-actions">
      <button id="saveBtn" class="btn save-btn">Save Changes</button>
      <a href="admin.html" style="flex:1"><button class="btn"
          style="width:100%; background:#444; color:#fff">Back</button></a>
    </div>
  </div>
  <script type="module" src="view.js"></script>
</body>

</html>
