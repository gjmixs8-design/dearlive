<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAR Database Viewer</title>
  <style>
    body {
      background: #1a1a1a;
      color: #eee;
      font-family: sans-serif;
      padding: 20px;
    }

    .grid {
      display: grid;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .dear-grid {
      grid-template-columns: 100px 1fr 1fr 1fr 1fr;
    }

    .kl-grid {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .jack-grid {
      grid-template-columns: 100px 1fr;
    }

    .header {
      font-weight: bold;
      color: #f8c128;
      background: #000;
      border-radius: 5px;
    }

    input {
      background: #222;
      border: 1px solid #444;
      color: #fff;
      padding: 8px;
      text-align: center;
      border-radius: 4px;
    }

    input.changed {
      border-color: #f8c128;
      box-shadow: 0 0 5px #f8c128;
    }

    .save-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000;
      padding: 20px;
      text-align: center;
    }

    button {
      background: #f8c128;
      border: none;
      padding: 10px 30px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
  <script type="module" src="firebase-init.js" defer></script>
  <script type="module" src="view.js" defer></script>
</head>

<body>
  <input type="date" id="viewDate" style="margin-bottom: 20px;">

  <h3>Dear Records</h3>
  <div class="grid dear-grid header">
    <div>Time</div>
    <div>Machine</div>
    <div>Result</div>
    <div>3-Digit</div>
    <div>Guess(2D)</div>
  </div>
  <div id="dear-view"></div>

  <h3>KL Records</h3>
  <div class="grid kl-grid header">
    <div>Machine</div>
    <div>Result</div>
    <div>Guess(3D)</div>
  </div>
  <div id="kl-view"></div>

  <h3>Jackpot Records</h3>
  <div class="grid jack-grid header">
    <div>Time</div>
    <div>Number</div>
  </div>
  <div id="jack-view"></div>

  <div class="save-bar">
    <button id="saveChanges">Update Modified Records</button>
    <a href="admin.html" style="color:#aaa; margin-left: 20px;">Back to Admin</a>
  </div>
</body>

</html>
