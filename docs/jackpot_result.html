<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackpot + Kerala Result Chart 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Guerrilla&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <style>
        :root {
            --jackpot-gold: #FFD700;
            --jackpot-deep-red: #B22222;
            --sidebar-maroon: #4A0000;
            --header-gold: #f4c430;
            --border: #222;
            --scale: 1;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Trebuchet MS', sans-serif;
            background: #fffdf0;
            margin: 0;
            text-align: center;
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--jackpot-deep-red), #1e77eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: "Protest Guerrilla", sans-serif;
            font-size: 2.2rem;
            margin-top: 40px;
        }

        .toolbar {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        select, .btn-apply {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        .btn-apply {
            background: var(--jackpot-deep-red);
            color: white;
            border: none;
            cursor: pointer;
        }

        .table-outer {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .table-inner {
            transform: scale(var(--scale));
            transform-origin: top center;
            padding: 10px;
        }

        #captureArea {
            background: white;
            display: inline-block;
            border: 4px solid #000;
        }

        table {
            border-collapse: collapse;
            min-width: 1100px;
        }

        .banner-row {
            background: var(--jackpot-deep-red);
            color: var(--jackpot-gold);
            font-size: 28px;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
        }

        .hdr-sub td {
            background: #333;
            color: #fff;
            padding: 10px;
        }

        .col-time {
            background: var(--header-gold) !important;
            color: #000 !important;
        }

        .time-label {
            display: block;
            font-size: 16px;
            font-weight: 900;
        }

        .col-date {
            background: #c74b4b;
            color: #fff;
            width: 60px;
            font-size: 18px;
        }

        .col-jackpot-cell {
            background: #fff9c4;
            color: #000;
            width: 130px;
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            font-size: 22px;
            font-weight: 900;
        }

        td, th {
            border: 1px solid var(--border);
            padding: 12px 5px;
            font-weight: 800;
            text-align: center;
        }

        .btn-download {
            background: var(--jackpot-deep-red);
            color: var(--jackpot-gold);
            margin: 30px 0;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            border: 2px solid var(--jackpot-gold);
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="main-content">
        <h1 class="gradient-text">JACKPOT + KERALA RESULT CHART</h1>

        <div class="toolbar">
            <select id="monthSelect"></select>
            <select id="yearSelect">
                <option value="2026" selected>2026</option>
                <option value="2025">2025</option>
            </select>
            <button class="btn-apply" onclick="renderChart()">Apply Filter</button>
        </div>

        <div class="table-outer" id="tableOuter">
            <div class="table-inner" id="tableInner">
                <div id="captureArea">
                    <table id="targetTable">
                        <thead>
                            <tr>
                                <th colspan="11" class="banner-row" id="tableBannerTitle">JACKPOT + KERALA RESULT CHART</th>
                            </tr>
                            <tr class="hdr-sub">
                                <td style="background:#cc4e4e; color:white;">DATE</td>
                                <td class="col-time"><span class="time-label">11 AM</span></td>
                                <td class="col-time"><span class="time-label">12 PM</span></td>
                                <td class="col-time"><span class="time-label">01 PM</span></td>
                                <td class="col-time"><span class="time-label">02 PM</span></td>
                                <td style="background: gold; color: black; font-weight: 900;">KERALA</td>
                                <td class="col-time"><span class="time-label">04 PM</span></td>
                                <td class="col-time"><span class="time-label">06 PM</span></td>
                                <td class="col-time"><span class="time-label">07 PM</span></td>
                                <td class="col-time"><span class="time-label">08 PM</span></td>
                                <td style="background:#cc4e4e; color:white;">DATE</td>
                            </tr>
                        </thead>
                        <tbody id="chartBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <button class="btn-download" onclick="exportToPNG()">Download PNG Chart</button>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://dearlive-97ef5-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    const mSel = document.getElementById('monthSelect');
    const ySel = document.getElementById('yearSelect');

    // Helper: Validate if a specific slot time on a specific date has passed
    function isTimeReached(dateKey, slotTimeStr, customHour = null) {
        const now = new Date();
        const [time, modifier] = slotTimeStr.split(' ');
        let [hours, minutes] = time.split(':');
        hours = parseInt(hours);

        if (modifier === 'PM' && hours < 12) hours += 12;
        if (modifier === 'AM' && hours === 12) hours = 0;
        
        // If a custom hour is provided (like for Kerala), override
        if (customHour !== null) hours = customHour;

        const slotDate = new Date(dateKey); 
        slotDate.setHours(hours, parseInt(minutes || 0), 0, 0);

        return now >= slotDate;
    }

    // Setup Month Dropdown
    monthNames.forEach((m, i) => {
        let opt = new Option(m, i + 1);
        if (i === new Date().getMonth()) opt.selected = true;
        mSel.add(opt);
    });

    window.renderChart = function() {
        const month = String(mSel.value).padStart(2, '0');
        const year = ySel.value;
        const banner = document.getElementById('tableBannerTitle');
        if(banner) banner.innerText = `JACKPOT + KERALA RESULT CHART - ${monthNames[parseInt(month) - 1]} ${year}`;

        const lotteryRef = ref(db, 'lottery');
        onValue(lotteryRef, (snapshot) => {
            const allData = snapshot.val() || {};
            const body = document.getElementById('chartBody');
            const daysInMonth = new Date(year, month, 0).getDate();
            
            let bodyHtml = "";
            const timeSlots = ["11:00 AM", "12:00 PM", "01:00 PM", "02:00 PM", "04:00 PM", "06:00 PM", "07:00 PM", "08:00 PM"];

            for (let d = 1; d <= daysInMonth; d++) {
                const dayStr = String(d).padStart(2, '0');
                const dateKey = `${year}-${month}-${dayStr}`;
                const dayData = allData[dateKey] || {};

                // 1. Process Jackpot Results
                let results = timeSlots.map(slot => {
                    const slotData = dayData[slot];
                    // Check if: 1. Data exists, 2. Jackpot field is filled, 3. Time has passed
                    const isReady = slotData && slotData.jackpot && slotData.jackpot.trim() !== "" && isTimeReached(dateKey, slot);
                    return isReady ? slotData.jackpot : "---";
                });
                
                // 2. Process Kerala Result (Threshold: 3:00 PM)
                let keralaVal = "---";
                const isKeralaTime = isTimeReached(dateKey, "03:00 PM", 15);
                
                Object.values(dayData).forEach(val => {
                    // Check if kl_result exists and kl_machine is also filled (standardizing "Ready" state)
                    if (val.kl_result && val.kl_result.trim() !== "" && val.kl_machine && isKeralaTime) {
                        keralaVal = val.kl_result;
                    }
                });

                bodyHtml += `
                    <tr>
                        <td class="col-date">${d}</td>
                        <td>${results[0]}</td><td>${results[1]}</td><td>${results[2]}</td><td>${results[3]}</td>
                        <td class="col-jackpot-cell">${keralaVal}</td>
                        <td>${results[4]}</td><td>${results[5]}</td><td>${results[6]}</td><td>${results[7]}</td>
                        <td class="col-date">${d}</td>
                    </tr>`;
            }
            if(body) body.innerHTML = bodyHtml;
            setTimeout(applyAutoScale, 100);
        });
    };

    function applyAutoScale() {
        const outer = document.getElementById('tableOuter');
        const captureArea = document.getElementById('captureArea');
        if(!outer || !captureArea) return;

        const availableWidth = window.innerWidth * 0.98;
        const actualWidth = captureArea.offsetWidth;
        let scale = Math.min(1, availableWidth / actualWidth);
        document.documentElement.style.setProperty('--scale', scale);
        outer.style.height = (captureArea.offsetHeight * scale) + 40 + "px";
    }

    window.exportToPNG = async function() {
        const node = document.getElementById('captureArea');
        const btn = document.querySelector('.btn-download');
        if(btn) btn.innerText = "Capturing Image...";
        try {
            const dataUrl = await htmlToImage.toPng(node, {
                backgroundColor: '#ffffff',
                pixelRatio: 2,
                style: { transform: 'scale(1)', transformOrigin: 'top left' }
            });
            const link = document.createElement('a');
            link.download = `Jackpot-Kerala-Chart-${monthNames[mSel.value - 1]}.png`;
            link.href = dataUrl;
            link.click();
        } catch (e) {
            alert("Capture failed.");
        } finally {
            if(btn) btn.innerText = "Download PNG Chart";
        }
    };

    window.addEventListener('resize', applyAutoScale);
    renderChart();
</script>
</body>
</html>
