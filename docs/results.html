<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEAR Lottery</title>

  <style>
    /* ===== Brand Variables ===== */
    :root {
      --sidebar-maroon: #ff0404c4;
      --sidebar-width: 260px;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #dfc016be, #ffffff);
      color: #fff;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* --- Sidebar Styling (Unified) --- */
    .sidebar {
      position: fixed;
      left: calc(-1 * var(--sidebar-width));
      top: 0;
      height: 100%;
      width: var(--sidebar-width);
      background: var(--sidebar-maroon);
      color: white;
      transition: 0.3s ease;
      z-index: 3000;
      padding-top: 60px;
      text-align: left;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar a {
      padding: 15px 25px;
      display: block;
      color: white;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: bold;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-icon {
      position: fixed;
      top: 15px;
      left: 15px;
      cursor: pointer;
      z-index: 3100;
      background: white;
      padding: 8px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .menu-icon div {
      width: 25px;
      height: 3px;
      background: var(--sidebar-maroon);
      margin: 5px 0;
    }

    /* Stage */
    .stage {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 60px 12px 12px 12px;
      /* Top padding for menu icon */
    }

    .frame {
      position: relative;
      width: min(1200px, 96vw);
      aspect-ratio: 1247/768;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* ===== Banners ===== */
    .banner-live {
      position: absolute;
      inset: 0 0 auto 0;
      top: 92%;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      text-transform: uppercase;
      color: #000;
      font-size: 50px;
      pointer-events: none;
    }

    .banner-weekly {
      position: absolute;
      left: 0;
      right: 75px;
      top: 13.5%;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      text-transform: uppercase;
      color: #fae902;
      font-size: 35px;
      pointer-events: none;
    }

    /* ===== Digits ===== */
    .digit {
      position: absolute;
      left: var(--left);
      top: var(--top);
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(var(--scale, 1));
      font-weight: 800;
      font-size: 100px;
      color: #272626;
    }

    #d0 {
      --left: 25%;
      --top: 45.5%;
      --rot: -0.6deg;
    }

    #d1 {
      --left: 34.2%;
      --top: 45.5%;
      --rot: -0.2deg;
    }

    #d2 {
      --left: 43.3%;
      --top: 45.5%;
      --rot: 0deg;
    }

    #d3 {
      --left: 52.5%;
      --top: 45.5%;
      --rot: 0.2deg;
    }

    #d4 {
      --left: 61.7%;
      --top: 45.5%;
      --rot: 0.6deg;
    }

    /* ===== Info Bars ===== */
    .info-bar1 {
      position: absolute;
      top: 78.9%;
      left: 29%;
      transform: translateX(-50%);
      font-weight: 800;
      font-size: 30px;
      color: #EACF46;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .8);
      margin: -5px 0px;
    }

    .info-bar2 {
      position: absolute;
      top: 77.5%;
      left: 70.5%;
      transform: translateX(-50%);
      font-weight: 800;
      font-size: 35px;
      color: #EACF46;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .8);
    }

    .info-bar3 {
      position: absolute;
      top: 29.9%;
      left: -0.8%;
      margin: 11px 5px;
      transform: rotate(270deg);
      font-weight: 800;
      font-size: 32px;
      color: #EACF46;
    }

    .countdown {
      position: absolute;
      width: 157px;
      top: 27px;
      right: 2px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 800;
      background: #f3dd52;
      color: #691a6b;
      text-align: center;
    }

    /* ===== MOBILE RESPONSIVE FIXES ===== */
    @media (max-width: 576px) {
      .digit {
        font-size: 37px;
        font-weight: 750;
      }

      #d0,
      #d1,
      #d2,
      #d3,
      #d4 {
        --scale: 0.72;
        --top: 46%;
      }

      .countdown {
        width: 65px;
        font-size: 6px;
        padding: 4px;
        top: 4px;
        right: -2px;
      }

      .info-bar1 {
        font-size: 10px;
        top: 77.9%;
        margin: 0px 0px;
      }

      .info-bar2 {
        font-size: 10px;
        top: 77.5%;
      }

      .info-bar3 {
        font-size: 9px;
        font-weight: 750;
        margin: 5px 5px;
      }

      .banner-live {
        top: 85%;
        font-size: 15px;
      }

      .banner-weekly {
        left: 28px;
        top: 7%;
        font-size: 8px;
      }
    }

    .download-bar {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .btn-download {
      padding: 15px 30px;
      background: var(--sidebar-maroon);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <div class="stage">
    <div class="frame" id="capture-area">
      <img src="./images/result.png" alt="Lottery Frame" crossorigin="anonymous" />
      <div class="banner-live" id="banner-live">—</div>
      <div class="banner-weekly" id="banner-weekly">—</div>
      <div class="info-bar3">
        <div id="draw-time-left">--</div>
      </div>
      <div id="reels">
        <span class="digit" id="d0">0</span>
        <span class="digit" id="d1">0</span>
        <span class="digit" id="d2">0</span>
        <span class="digit" id="d3">0</span>
        <span class="digit" id="d4">0</span>
      </div>
      <div class="info-bar1">
        <div id="draw-date">--</div>
      </div>
      <div class="info-bar2">
        <div id="draw-time">--</div>
      </div>
      <div class="countdown" id="countdown">--:--:--</div>
    </div>

    <div class="download-bar">
      <button class="btn-download" id="downloadBtn">⬇️ Download High-Res Result</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* =======================
    FIREBASE CONFIG
   ======================= */

const firebaseConfig = {
    apiKey: "AIzaSyCVIGlYqFf1AktnPXflEFjewAl7oNJQXrE",
    authDomain: "dearlive-97ef5.firebaseapp.com",
    projectId: "dearlive-97ef5",
    storageBucket: "dearlive-97ef5.firebasestorage.app",
    messagingSenderId: "28322305982",
    appId: "1:28322305982:web:aeb257a85ff8213436cbef"
  };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =======================
    DOM ELEMENTS
   ======================= */

const digits = ["d0", "d1", "d2", "d3", "d4"].map(id => document.getElementById(id));
const drawDateEl = document.getElementById("draw-date");
const drawTimeEl = document.getElementById("draw-time");
const drawTimeLeftEl = document.getElementById("draw-time-left");
const countdownEl = document.getElementById("countdown");
const liveEl = document.getElementById("banner-live");
const weeklyEl = document.getElementById("banner-weekly");

/* =======================
    TIME SETTINGS
   ======================= */

const TIMEZONE = "Asia/Kolkata";
const SLOTS = ['10:00 AM','11:00 AM','12:00 PM','01:00 PM','05:00 PM','06:00 PM','07:00 PM','08:00 PM'];

const pad2 = n => String(n).padStart(2, '0');
const nowIST = () => new Date(new Date().toLocaleString("en-US", { timeZone: TIMEZONE }));
const ymd = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

function parseSlot(dateYMD, label){
  const m = /(\d{1,2}):(\d{2})\s*([AP]M)/i.exec(label);
  let H = (parseInt(m[1]) % 12) + (m[3].toUpperCase()==='PM'?12:0);
  return new Date(`${dateYMD}T${pad2(H)}:${m[2]}:00`);
}

function getSchedule(now){
  const today = ymd(now);
  const todaySlots = SLOTS.map(s=>({label:s,time:parseSlot(today,s),date:today}));

  const future = todaySlots.find(s=>s.time>now);
  if(future){
    const prev = todaySlots.filter(s=>s.time<=now).at(-1);
    return {next:future, prev:prev};
  }

  const tomorrow = new Date(now); tomorrow.setDate(now.getDate()+1);
  return {
    next:{label:SLOTS[0], time:parseSlot(ymd(tomorrow),SLOTS[0]), date:ymd(tomorrow)},
    prev:todaySlots.at(-1)
  };
}

const msToHMS = ms=>{
  if(ms<0) ms=0;
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  const s=Math.floor((ms%60000)/1000);
  return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
};

/* =======================
    RESULT LISTENER
   ======================= */

let currentRef = null;

function attachResultListener(date,label){

  if(currentRef){
    off(currentRef);
  }

  const path = `lottery/${date}/${label}/result`;
  currentRef = ref(db, path);

  onValue(currentRef, snap=>{
    if(!snap.exists()){
      digits.forEach(d=>d.textContent="0");
      return;
    }

    const value = String(snap.val()).replace(/\D/g,"").padStart(5,"0").slice(0,5);

    for(let i=0;i<5;i++){
      digits[i].textContent=value[i];
    }
  });
}

/* =======================
   MAIN UPDATE LOOP
   ======================= */

let schedule = getSchedule(nowIST());
attachResultListener(schedule.prev.date, schedule.prev.label);

function update(){

  const now = nowIST();
  const oldLabel = schedule.prev.label;
  const oldDate = schedule.prev.date;

  schedule = getSchedule(now);

  drawDateEl.textContent = schedule.next.time.toLocaleDateString("en-IN",{timeZone:TIMEZONE});
  drawTimeEl.textContent = schedule.prev.label;
  drawTimeLeftEl.textContent = schedule.prev.label;
  countdownEl.textContent = msToHMS(schedule.next.time-now);

  const weekday = now.toLocaleDateString("en-US",{timeZone:TIMEZONE,weekday:'long'}).toUpperCase();
  liveEl.textContent = `DEAR ${weekday} LIVE ${schedule.prev.label.replace(":00","").replace(" ","")}`;
  weeklyEl.textContent = `DEAR ${weekday} WEEKLY LOTTERY`;

  if(oldLabel!==schedule.prev.label || oldDate!==schedule.prev.date){
    attachResultListener(schedule.prev.date, schedule.prev.label);
  }
}

setInterval(update,1000);
update();

/* =======================
    DOWNLOAD IMAGE
   ======================= */

document.getElementById("downloadBtn").addEventListener("click",()=>{
  const area=document.getElementById("capture-area");

  html2canvas(area,{
    scale:3,
    useCORS:true,
    backgroundColor:"#ffffff"
  }).then(canvas=>{
    const link=document.createElement("a");
    link.download=`DearMC_Result_${drawTimeEl.textContent.replace(/\s/g,'')}.png`;
    link.href=canvas.toDataURL("image/png",1.0);
    link.click();
  });
});
</script>
</body>

</html>
